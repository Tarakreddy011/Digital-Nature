spring.application.name=api-gateway
server.port=9090
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Route to Account Service
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://account-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/account/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=accountCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/account-service

# Route to Loan Service
spring.cloud.gateway.routes[1].id=loan-service
spring.cloud.gateway.routes[1].uri=lb://loan-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/loan/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=loanCircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/loan-service

# Route to Greet Service
spring.cloud.gateway.routes[2].id=greet-service
spring.cloud.gateway.routes[2].uri=lb://greet-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/greet/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=greetCircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/greet-service

# Route to User Service with path rewriting
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/users(?<segment>/?.*), /users$\{segment}
spring.cloud.gateway.routes[3].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[1].args.name=userCircuitBreaker
spring.cloud.gateway.routes[3].filters[1].args.fallbackUri=forward:/fallback/user-service

# Route to Order Service with path rewriting
spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/orders(?<segment>/?.*), /orders$\{segment}
spring.cloud.gateway.routes[4].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[1].args.name=orderCircuitBreaker
spring.cloud.gateway.routes[4].filters[1].args.fallbackUri=forward:/fallback/order-service

# Route to Inventory Service with caching
spring.cloud.gateway.routes[5].id=inventory-service
spring.cloud.gateway.routes[5].uri=lb://inventory-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/inventory/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/inventory(?<segment>/?.*), /inventory$\{segment}
spring.cloud.gateway.routes[5].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[1].args.name=inventoryCircuitBreaker
spring.cloud.gateway.routes[5].filters[1].args.fallbackUri=forward:/fallback/inventory-service

# Route to Payment Service
spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=lb://payment-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/payments(?<segment>/?.*), /payments$\{segment}
spring.cloud.gateway.routes[6].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[6].filters[1].args.name=paymentCircuitBreaker
spring.cloud.gateway.routes[6].filters[1].args.fallbackUri=forward:/fallback/payment-service

# Custom Resilience4j circuit breaker settings used by gateway route filters.
resilience4j.circuitbreaker.configs.gateway.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.gateway.sliding-window-size=10
resilience4j.circuitbreaker.configs.gateway.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.gateway.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.gateway.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.gateway.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.accountCircuitBreaker.base-config=gateway
resilience4j.circuitbreaker.instances.loanCircuitBreaker.base-config=gateway
resilience4j.circuitbreaker.instances.greetCircuitBreaker.base-config=gateway
resilience4j.circuitbreaker.instances.userCircuitBreaker.base-config=gateway
resilience4j.circuitbreaker.instances.orderCircuitBreaker.base-config=gateway
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.base-config=gateway
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.base-config=gateway

resilience4j.timelimiter.configs.gateway.timeout-duration=3s
resilience4j.timelimiter.configs.gateway.cancel-running-future=true
resilience4j.timelimiter.instances.accountCircuitBreaker.base-config=gateway
resilience4j.timelimiter.instances.loanCircuitBreaker.base-config=gateway
resilience4j.timelimiter.instances.greetCircuitBreaker.base-config=gateway
resilience4j.timelimiter.instances.userCircuitBreaker.base-config=gateway
resilience4j.timelimiter.instances.orderCircuitBreaker.base-config=gateway
resilience4j.timelimiter.instances.inventoryCircuitBreaker.base-config=gateway
resilience4j.timelimiter.instances.paymentCircuitBreaker.base-config=gateway

# Redis configuration for caching (optional, can use embedded for demo)
spring.redis.host=localhost
spring.redis.port=6379

spring.application.name=orm-learn

# --- Datasource (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:ormdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Uncomment and configure the following for MySQL instead of H2:
# spring.datasource.url=jdbc:mysql://localhost:3306/ormdb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=secret
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# --- Hibernate DDL auto (create | create-drop | update | validate | none) ---
# Change to 'create' or 'validate' as needed. Default here is 'update'.
spring.jpa.hibernate.ddl-auto=update

# --- SQL logging ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Server port
server.port=8081
